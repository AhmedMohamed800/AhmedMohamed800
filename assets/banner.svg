<svg width="900" height="335" viewBox="0 0 900 335" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
    @keyframes blink  { 0%,49%{ opacity:1 } 50%,100%{ opacity:0 } }

    .l0  { opacity:0; animation: fadeIn .05s forwards  .3s; }
    .l1  { opacity:0; animation: fadeIn .05s forwards  .7s; }
    .l2  { opacity:0; animation: fadeIn .05s forwards 1.0s; }
    .l3  { opacity:0; animation: fadeIn .05s forwards 1.3s; }
    .l4  { opacity:0; animation: fadeIn .05s forwards 1.6s; }
    .l5  { opacity:0; animation: fadeIn .05s forwards 1.9s; }
    .l6  { opacity:0; animation: fadeIn .05s forwards 2.2s; }
    .l7  { opacity:0; animation: fadeIn .05s forwards 2.5s; }
    .l8  { opacity:0; animation: fadeIn .05s forwards 2.8s; }
    .l9  { opacity:0; animation: fadeIn .05s forwards 3.1s; }
    .l10 { opacity:0; animation: fadeIn .05s forwards 3.4s; }
    .l11 { opacity:0; animation: fadeIn .05s forwards 3.7s; }
    .l12 { opacity:0; animation: fadeIn .05s forwards 4.0s; }
    .l13 { opacity:0; animation: fadeIn .05s forwards 4.3s; }
    .l14 { opacity:0; animation: fadeIn .05s forwards 4.6s; }

    .cursor { animation: blink 1s step-end infinite; }
  </style>

  <!-- Animated vertical gradient across the full ASCII art block (y 78вҶ’168) -->
  <linearGradient id="asciiGrad" x1="0" y1="78" x2="0" y2="168" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#cae8ff">
      <animate attributeName="stop-color"
        values="#cae8ff;#79c0ff;#388bfd;#79c0ff;#cae8ff"
        dur="5s" repeatCount="indefinite"/>
    </stop>
    <stop offset="100%" stop-color="#1f6feb">
      <animate attributeName="stop-color"
        values="#1f6feb;#388bfd;#79c0ff;#388bfd;#1f6feb"
        dur="5s" repeatCount="indefinite"/>
    </stop>
  </linearGradient>
</defs>

